<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>¡Mensaje Recibido!</title>
  <style>
    :root {
      --bg-primary: #0f172a;
      --surface: #1e293b;
      --accent: #ff5400;
      --ink: #f1f5f9;
      --ink-muted: #94a3b8;
    }

    body {
      font-family: "Inter", "Trebuchet MS", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: var(--bg-primary);
      color: var(--ink);
    }

    .card {
      text-align: center;
      background: var(--surface);
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
      max-width: 420px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    h1 {
      color: var(--ink);
      margin-top: 0;
      font-size: 2rem;
      margin-bottom: 16px;
    }

    p {
      color: var(--ink-muted);
      line-height: 1.6;
      margin-bottom: 8px;
    }

    a {
      display: inline-block;
      margin-top: 24px;
      color: #ffffff;
      background: var(--accent);
      padding: 14px 28px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
      box-shadow: 0 4px 12px rgba(255, 84, 0, 0.3);
    }
    
    a:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(255, 84, 0, 0.5);
      background: #ff751a;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>¡Gracias por escribirnos!</h1>
    <p>Hemos recibido tus datos correctamente.</p>
    <p>Te contactaremos a la brevedad.</p>
    <br>
    <a href="index.html">← Volver al inicio</a>
  </div>
</body>
</html>
